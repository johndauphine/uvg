[graph]
all-features = true

[advisories]
db-urls = ["https://github.com/RustSec/advisory-db"]
yanked = "warn"
unmaintained = "workspace"
unsound = "workspace"
unused-ignored-advisory = "warn"
ignore = [
    # Transitive via sqlx-mysql 0.8.6. RustSec currently lists no patched
    # rsa release; keep this narrow and revisit when sqlx can move.
    "RUSTSEC-2023-0071",
    # Transitive via tiberius 0.12.3 -> rustls 0.21 -> rustls-webpki 0.101.7.
    # tiberius 0.12.3 is the current release and has no compatible update path.
    "RUSTSEC-2026-0098",
    "RUSTSEC-2026-0099",
    "RUSTSEC-2026-0104",
]

[licenses]
confidence-threshold = 0.8
unused-allowed-license = "allow"
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]

[licenses.private]
ignore = false

[bans]
multiple-versions = "warn"
wildcards = "warn"
allow-wildcard-paths = true
workspace-default-features = "allow"
external-default-features = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
