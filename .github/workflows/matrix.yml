name: Matrix E2E

# Runs the CRM cross-dialect matrix end-to-end against live MSSQL,
# PostgreSQL, and MySQL containers. Green iff all 9 (source, target)
# pairs report OK. See testdata/crm/README.md.
#
# Triggers (per #61):
#   - push to master / PR to master: primary signal, catches regressions
#     at PR time when fixing is cheapest.
#   - nightly cron: catches upstream container-image drift that the
#     pinned-tag PR runs can't see until the tag is bumped.
#   - workflow_dispatch: manual re-run, e.g. after closing an upstream
#     incident.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 8 * * *'  # 08:00 UTC daily
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

# Hygiene: read-only by default; the auto-open-issue step below
# re-grants `issues: write` for itself only.
permissions:
  contents: read

# Don't run two matrix jobs for the same branch in parallel — both
# would try to bind host ports 1433/5432/3306 (different runners,
# different VMs, so functionally fine, but it wastes CI minutes).
concurrency:
  group: matrix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  matrix:
    name: CRM 9-pair matrix
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write  # for the scheduled-failure auto-issue step

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2

      - name: Build uvg (release)
        run: cargo build --release

      # Start the three DB containers with the same names the matrix
      # runner expects (mssql-test / pg-test / mysql-test). Using
      # `docker run` rather than GitHub Actions `services:` so the
      # runner can `docker exec` into each container — that's how
      # `run_matrix.sh` already talks to PG and MySQL today, and
      # keeping the script unchanged means local dev and CI exercise
      # the same path.
      - name: Start MSSQL container
        # MSSQL 2022 deprecated `SA_PASSWORD` in favor of
        # `MSSQL_SA_PASSWORD`. Set the new name; current images still
        # honor the old one but emit a warning and will eventually drop
        # it. Keeping only the new var keeps logs clean.
        run: |
          docker run -d --name mssql-test \
            -e ACCEPT_EULA=Y \
            -e MSSQL_SA_PASSWORD=TestPass2024 \
            -e MSSQL_PID=Developer \
            -p 1433:1433 \
            mcr.microsoft.com/mssql/server:2022-latest

      - name: Start PostgreSQL container
        run: |
          docker run -d --name pg-test \
            -e POSTGRES_PASSWORD=TestPass2024 \
            -p 5432:5432 \
            postgres:16-alpine

      - name: Start MySQL container
        run: |
          docker run -d --name mysql-test \
            -e MYSQL_ROOT_PASSWORD=TestPass2024 \
            -p 3306:3306 \
            mysql:8.0

      - name: Install sqlcmd shim
        # Routes any host-side `sqlcmd ...` call through
        # `docker exec mssql-test` so we don't need Microsoft's
        # go-sqlcmd installed in the runner. Same file devs can
        # install locally if they don't want go-sqlcmd either.
        run: |
          sudo install -m 0755 testdata/crm/sqlcmd-shim.sh /usr/local/bin/sqlcmd
          sqlcmd -? 2>/dev/null | head -1 || true

      - name: Wait for containers to accept connections
        # `cmd && break` inside `set -e` doesn't fail the step when the
        # loop times out — control just falls through. Track readiness
        # explicitly and `exit 1` with container logs so a stuck DB
        # doesn't silently let the rest of the job proceed and produce
        # a confusing downstream error.
        run: |
          set -e
          wait_for() {
            local name=$1 attempts=$2 check_cmd=$3 logs_container=$4
            echo "Waiting for $name (up to $((attempts * 2))s)..."
            for i in $(seq 1 "$attempts"); do
              if eval "$check_cmd" >/dev/null 2>&1; then
                echo "$name ready after $((i * 2))s."
                return 0
              fi
              sleep 2
            done
            echo "::error::$name never became ready; recent logs:" >&2
            docker logs --tail 80 "$logs_container" >&2 || true
            return 1
          }
          wait_for "PostgreSQL" 30 \
            'docker exec pg-test pg_isready -U postgres -h localhost' \
            pg-test
          wait_for "MySQL" 60 \
            'docker exec mysql-test mysqladmin ping -h localhost -uroot -pTestPass2024 --silent' \
            mysql-test
          wait_for "MSSQL" 60 \
            'sqlcmd -S localhost,1433 -U sa -P TestPass2024 -C -Q "SELECT 1"' \
            mssql-test
          echo "All three containers ready."

      - name: Load MSSQL CRM source
        run: |
          sqlcmd -S localhost,1433 -U sa -P TestPass2024 -C \
            -Q "IF NOT EXISTS (SELECT 1 FROM sys.databases WHERE name='CRM_MSSQL') CREATE DATABASE CRM_MSSQL;"
          sqlcmd -S localhost,1433 -U sa -P TestPass2024 -C -d CRM_MSSQL \
            -i testdata/crm/crm_mssql.sql >/dev/null

      - name: Load PostgreSQL CRM source
        run: |
          PGPASSWORD=TestPass2024 docker exec pg-test createdb -U postgres crm_pg
          PGPASSWORD=TestPass2024 docker exec -i pg-test psql -U postgres -d crm_pg < testdata/crm/crm_postgres.sql >/dev/null

      - name: Load MySQL CRM source
        run: |
          docker exec mysql-test mysql -uroot -pTestPass2024 \
            -e "CREATE DATABASE crm_mysql"
          docker exec -i mysql-test mysql -uroot -pTestPass2024 crm_mysql < testdata/crm/crm_mysql.sql

      - name: Run CRM matrix (strict)
        run: bash testdata/crm/run_matrix.sh --strict

      - name: Upload matrix results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: matrix-results
          path: /tmp/uvg-matrix/
          if-no-files-found: warn

      - name: Open issue on nightly failure
        # Only fires on the scheduled run — PR / push failures already
        # surface as a red check on the PR/commit. The nightly is the
        # one that can pass silently if no one's watching the badge.
        # Dedupes by labeling and checking for an existing open issue.
        if: failure() && github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -e
          existing=$(gh issue list --label nightly-matrix-failure --state open --json number --jq '.[0].number // empty')
          today=$(date -u +%Y-%m-%d)
          if [[ -n "$existing" ]]; then
            gh issue comment "$existing" --body "Nightly matrix failed again on $today: $RUN_URL"
          else
            gh label create nightly-matrix-failure --color FF0000 --description "Auto-opened by Matrix E2E workflow on a failing nightly run" 2>/dev/null || true
            gh issue create \
              --title "Nightly CRM matrix failure ($today)" \
              --label nightly-matrix-failure \
              --body "The nightly CRM matrix run failed. Run: $RUN_URL. This issue auto-opens when the scheduled Matrix E2E workflow fails; subsequent failures will comment here rather than opening new issues. Close once the matrix is green again."
          fi
